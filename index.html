<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spin the Fit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="https://ko-fi.com/spinthefit" target="_blank" class="kofi-topright">
  <div class="kofi-button">☕ Support Me</div>
</a>

<header>
  <h1>🎨 Spin the Fit</h1>
  <p>Spin colours, textures, and chaotic outfit ideas</p>
</header>

<main>

  <section class="category">
    <h2>Base Colour</h2>

    <div class="wheel-pair">

      <div class="wheel-group">
        <h3>Full Spectrum</h3>
        <button onclick="spinBase()">Spin</button>
        <div id="baseResult"></div>
      </div>

      <div class="wheel-group">
        <h3>Pastel</h3>
        <button onclick="spinPastel()">Spin</button>
        <div id="pastelResult"></div>
      </div>

    </div>
  </section>

  <section class="category">
    <h2>Colour Harmony</h2>

    <div class="wheel-pair">

      <div class="wheel-group">
        <h3>Complementary</h3>
        <button onclick="spinComplementary()">Spin</button>
        <div id="complementaryResult"></div>
      </div>

      <div class="wheel-group">
        <h3>Analogous</h3>
        <button onclick="spinAnalogous()">Spin</button>
        <div id="analogousResult"></div>
      </div>

    </div>
  </section>

  <section class="category">
    <h2>Style System</h2>

    <div class="wheel-pair">

      <div class="wheel-group">
        <h3>Monochrome</h3>
        <button onclick="spinMonochrome()">Spin</button>
        <div id="monoResult"></div>
      </div>

      <div class="wheel-group">
        <h3>Textures</h3>
        <button onclick="spinTexture()">Spin</button>
        <div id="textureResult"></div>
      </div>

    </div>
  </section>

  <!-- NEW: CARD DRAW SYSTEM -->
  <section class="category">
    <h2>Outfit Card Draw</h2>

    <div class="wheel-group" style="margin: 0 auto;">
      <h3>Draw a Random Fit Idea</h3>
      <button onclick="drawCard()">Draw Card</button>
      <div id="cardResult"></div>
    </div>
  </section>

</main>

<script src="script.js"></script>

</body>
</html>
